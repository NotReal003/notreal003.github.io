<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5; url=https://notreal003.github.io/support/closure-announcement">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #0d0d0d;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: glow 2s infinite alternate;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .loader {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #00d4ff;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        .dots {
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .dots::after {
            content: "";
            animation: dots 1.5s infinite steps(4);
        }

        a {
            color: #00d4ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00d4ff;
            }
            to {
                text-shadow: 0 0 25px #00d4ff, 0 0 50px #00d4ff;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dots {
            0% { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
            100% { content: ""; }
        }
    </style>

    <script>
        setTimeout(() => {
            window.location.replace("https://notreal003.github.io/support/closure-announcement");
        }, 5000);
    </script>
</head>
<body>

<div class="container">
    <h1>Redirecting</h1>
    <p>Please wait while we take you to the new page.</p>

    <div class="loader"></div>

    <div class="dots">Loading</div>

    <p style="margin-top:30px;font-size:14px;">
        If you are not redirected automatically,
        <a href="https://notreal003.github.io/support/closure-announcement">
            click here
        </a>.
    </p>
</div>

</body>
</html>
